<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{PR_TITLE}} - PR Review</title>
<!--
  This is a shell assembled into a final report by assemble.py. The double-brace
  tokens below are filled in by that script: PR_TITLE in the head title, HEADER
  (verdict chip + h1 + meta), TABS (nav buttons), PANELS (synthesis + one panel per
  reviewer), and TIMESTAMP in the footer. Agent report bodies are pre-rendered to
  HTML by assemble.py, so the only script here drives tab switching. Do NOT write
  the literal placeholder tokens in this comment - the script would substitute into
  them and duplicate the body.
-->
<style>
  :root {
    --bg: #0d1117;
    --panel: #161b22;
    --panel-2: #1c2128;
    --border: #30363d;
    --border-soft: #21262d;
    --text: #e6edf3;
    --muted: #8b949e;
    --link: #58a6ff;
    --red: #f85149;
    --red-bg: rgba(248, 81, 73, 0.10);
    --green: #3fb950;
    --green-bg: rgba(63, 185, 80, 0.10);
    --orange: #db7c2e;
    --orange-bg: rgba(219, 124, 46, 0.10);
    --yellow: #d29922;
    --yellow-bg: rgba(210, 153, 34, 0.10);
    --blue: #58a6ff;
    --blue-bg: rgba(88, 166, 255, 0.10);
    --purple: #a371f7;
    --purple-bg: rgba(163, 113, 247, 0.10);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    line-height: 1.55;
    font-size: 15px;
    -webkit-font-smoothing: antialiased;
  }
  .container {
    max-width: 880px;
    margin: 0 auto;
    padding: 48px 32px 96px;
  }

  /* Header */
  header { margin-bottom: 24px; }
  .verdict {
    display: inline-block;
    padding: 8px 16px;
    border-radius: 999px;
    font-weight: 600;
    font-size: 14px;
    letter-spacing: 0.2px;
    border: 1px solid transparent;
    margin-bottom: 20px;
  }
  .verdict.verdict-merge   { background: var(--green-bg);  color: var(--green);  border-color: var(--green); }
  .verdict.verdict-minor   { background: var(--yellow-bg); color: var(--yellow); border-color: var(--yellow); }
  .verdict.verdict-changes { background: var(--orange-bg); color: var(--orange); border-color: var(--orange); }
  .verdict.verdict-reject  { background: var(--red-bg);    color: var(--red);    border-color: var(--red); }

  h1 {
    font-size: 28px;
    line-height: 1.25;
    margin: 0 0 12px;
    font-weight: 600;
    letter-spacing: -0.3px;
  }
  .meta {
    color: var(--muted);
    font-size: 14px;
    margin: 0 0 8px;
  }
  .meta a { color: var(--link); text-decoration: none; }
  .meta a:hover { text-decoration: underline; }
  .meta .sep { color: var(--border); margin: 0 8px; }
  .ci-badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.4px;
    border: 1px solid var(--border);
    background: var(--panel-2);
    color: var(--muted);
    margin-left: 6px;
  }

  /* Tab strip */
  .tabs {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin: 8px 0 28px;
  }
  .tab {
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 8px 15px;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.2px;
    cursor: pointer;
    border-radius: 999px;
    font-family: inherit;
  }
  .tab:hover { color: var(--text); border-color: var(--muted); }
  .tab.active { color: var(--text); background: var(--panel-2); border-color: var(--blue); }
  .panel[hidden] { display: none; }

  .rationale {
    background: var(--panel);
    border: 1px solid var(--border);
    border-left: 3px solid var(--blue);
    padding: 14px 18px;
    border-radius: 6px;
    margin-top: 0;
    color: var(--text);
  }
  .rationale .label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    color: var(--muted);
    margin-bottom: 4px;
    font-weight: 600;
  }

  /* Purpose row */
  .purpose {
    margin: 28px 0 0;
    color: var(--text);
    font-size: 16px;
    line-height: 1.55;
  }
  .purpose .label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    color: var(--muted);
    margin-bottom: 6px;
    font-weight: 600;
  }

  /* Sections */
  section {
    margin-top: 40px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }
  section h2 {
    margin: 0;
    padding: 14px 20px;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.3px;
    text-transform: uppercase;
    border-bottom: 1px solid var(--border-soft);
    background: var(--panel-2);
  }
  section.red      h2 { color: var(--red); }
  section.green    h2 { color: var(--green); }
  section.orange   h2 { color: var(--orange); }
  section.yellow   h2 { color: var(--yellow); }
  section.pushback h2 { color: var(--orange); }
  section.pushback {
    border-color: var(--orange);
    box-shadow: 0 0 0 1px var(--orange) inset;
    margin-top: 0;
    margin-bottom: 32px;
  }
  section.pushback h2::before {
    content: "🔁  Re-review · ";
    color: var(--muted);
    font-weight: 500;
  }
  section.callouts h2 { color: var(--blue); }
  section.callouts {
    border-color: var(--blue);
    box-shadow: 0 0 0 1px var(--blue) inset;
    margin-top: 0;
    margin-bottom: 32px;
  }
  section.callouts h2::before {
    content: "💭  Reviewer note · ";
    color: var(--muted);
    font-weight: 500;
  }

  ul.findings {
    list-style: none;
    margin: 0;
    padding: 8px 0;
  }
  ul.findings li {
    padding: 12px 20px;
    border-bottom: 1px solid var(--border-soft);
    line-height: 1.55;
  }
  ul.findings li:last-child { border-bottom: none; }
  ul.findings li strong {
    color: var(--text);
    font-weight: 600;
  }
  ul.findings li.none {
    color: var(--muted);
    font-style: italic;
  }
  ul.findings code {
    background: var(--panel-2);
    border: 1px solid var(--border-soft);
    padding: 1px 6px;
    border-radius: 4px;
    font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, monospace;
    font-size: 13px;
    color: var(--link);
  }
  ul.findings li .src {
    display: inline-block;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.4px;
    color: var(--muted);
    border: 1px solid var(--border-soft);
    border-radius: 4px;
    padding: 0 6px;
    margin-right: 8px;
    vertical-align: 1px;
  }

  /* Agent report panels (markdown pre-rendered by assemble.py) */
  .agent-report {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 24px 30px;
  }
  .agent-report .agent-head {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 0 0 4px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border-soft);
  }
  .agent-report .agent-head .badge { font-size: 22px; line-height: 1; }
  .agent-report .agent-head .name { font-size: 18px; font-weight: 600; letter-spacing: -0.2px; }
  .agent-report .agent-head .role { color: var(--muted); font-size: 13px; }
  .agent-report .body > :first-child { margin-top: 14px; }
  .agent-report h1 { font-size: 21px; margin: 26px 0 10px; letter-spacing: -0.2px; }
  .agent-report h2 {
    font-size: 17px; margin: 26px 0 10px; padding: 0; border: none;
    background: none; text-transform: none; letter-spacing: 0; color: var(--text);
  }
  .agent-report h3 { font-size: 15px; margin: 22px 0 8px; color: var(--text); }
  .agent-report h4 { font-size: 14px; margin: 18px 0 6px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.4px; }
  .agent-report p { margin: 10px 0; }
  .agent-report ul, .agent-report ol { margin: 10px 0; padding-left: 22px; }
  .agent-report li { margin: 5px 0; }
  .agent-report code {
    background: var(--panel-2);
    border: 1px solid var(--border-soft);
    padding: 1px 6px;
    border-radius: 4px;
    font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, monospace;
    font-size: 13px;
    color: var(--link);
  }
  .agent-report pre {
    background: var(--panel-2);
    border: 1px solid var(--border-soft);
    border-radius: 6px;
    padding: 14px 16px;
    overflow: auto;
  }
  .agent-report pre code { background: none; border: none; padding: 0; color: var(--text); }
  .agent-report a { color: var(--link); text-decoration: none; }
  .agent-report a:hover { text-decoration: underline; }
  .agent-report blockquote {
    margin: 12px 0; padding: 4px 16px;
    border-left: 3px solid var(--border); color: var(--muted);
  }
  .agent-report hr { border: none; border-top: 1px solid var(--border-soft); margin: 22px 0; }

  /* Footer */
  footer {
    margin-top: 56px;
    padding-top: 20px;
    border-top: 1px solid var(--border-soft);
    color: var(--muted);
    font-size: 12px;
    text-align: center;
  }
  footer code {
    font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, monospace;
    color: var(--muted);
  }
</style>
</head>
<body>
<div class="container">

  {{HEADER}}

  <nav class="tabs" role="tablist">
    {{TABS}}
  </nav>

  {{PANELS}}

  <footer>
    Generated by <code>/review-pr</code> · {{TIMESTAMP}}
  </footer>

</div>

<script>
  document.querySelectorAll(".tab").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".tab").forEach(b => b.classList.remove("active"));
      document.querySelectorAll(".panel").forEach(p => p.hidden = true);
      btn.classList.add("active");
      document.getElementById(btn.dataset.panel).hidden = false;
      window.scrollTo({ top: 0 });
    });
  });
</script>
</body>
</html>
